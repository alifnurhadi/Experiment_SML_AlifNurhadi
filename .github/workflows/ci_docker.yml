name: Continuous Integration & Docker Push

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt mlflow

      - name: Run Model Training & Evaluation
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python src/modelling_tuning.py

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: evaluation-artifacts
          path: |
            classification_report.txt
            confusion_matrix.png

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image with MLflow
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/<GANTI_DENGAN_NAMA_REPO_DAGSHUB>.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Catatan: Ganti <RUN_ID> dengan Run ID yang valid dari DagsHub/MLflow Anda
          # Atau gunakan Model Registry URI seperti "models:/<Model_Name>/<Version>"

          MODEL_URI="runs:/<RUN_ID>/logistic_regression_model"
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/student-burnout-model:latest"

          echo "Membuat Docker Image dari MLflow Model..."
          mlflow models build-docker -m $MODEL_URI -n $IMAGE_NAME

          echo "Mendorong Docker Image ke Docker Hub..."
          docker push $IMAGE_NAME
